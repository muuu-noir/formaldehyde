<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 320 600" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Light diagonal hatching for panel interiors -->
    <pattern id="ph" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1610" stroke-width="0.55" stroke-opacity="0.35"/>
    </pattern>
    <!-- Denser cross-hatch for deep shadow corners -->
    <pattern id="ph2" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1610" stroke-width="0.7" stroke-opacity="0.5"/>
    </pattern>

    <!-- Clip paths for panel interiors -->
    <clipPath id="cTL"><rect x="60" y="70" width="84" height="122"/></clipPath>
    <clipPath id="cTR"><rect x="176" y="70" width="84" height="122"/></clipPath>
    <clipPath id="cBL"><rect x="60" y="228" width="84" height="292"/></clipPath>
    <clipPath id="cBR"><rect x="176" y="228" width="84" height="292"/></clipPath>

    <!-- Shadow corner clips (bottom-right of each panel) -->
    <clipPath id="sTL">
      <polygon points="96,70 144,70 144,192 60,192 60,156"/>
    </clipPath>
    <clipPath id="sTR">
      <polygon points="212,70 260,70 260,192 176,192 176,156"/>
    </clipPath>
    <clipPath id="sBL">
      <polygon points="96,228 144,228 144,520 60,520 60,484"/>
    </clipPath>
    <clipPath id="sBR">
      <polygon points="212,228 260,228 260,520 176,520 176,484"/>
    </clipPath>
  </defs>

  <!-- ── DOOR BODY ── -->
  <rect x="24" y="16" width="272" height="562" fill="#f2eeE6"/>

  <!-- ── OUTER FRAME ── -->
  <rect x="24" y="16" width="272" height="562" stroke="#0d0c09" stroke-width="11" fill="none"/>

  <!-- ── INNER MOLDING LINES ── -->
  <rect x="38" y="30" width="244" height="534" stroke="#0d0c09" stroke-width="1.8" fill="none"/>
  <rect x="44" y="36" width="232" height="522" stroke="#0d0c09" stroke-width="0.7" fill="none"/>

  <!-- ── HORIZONTAL CENTER RAIL ── -->
  <rect x="44" y="196" width="232" height="30" fill="#f2eeE6" stroke="#0d0c09" stroke-width="1"/>
  <line x1="44"  y1="200" x2="276" y2="200" stroke="#0d0c09" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="44"  y1="222" x2="276" y2="222" stroke="#f8f6f0" stroke-width="0.8"/>

  <!-- ── VERTICAL CENTER STILE ── -->
  <rect x="150" y="50" width="20" height="498" fill="#f2eeE6" stroke="#0d0c09" stroke-width="1"/>

  <!-- ══════════════════════════════
       PANELS — light hatch base
       then denser shadow in corners
       ══════════════════════════════ -->

  <!-- TOP-LEFT -->
  <rect x="60" y="70" width="84" height="122" fill="#f2eeE6" stroke="#0d0c09" stroke-width="1.5"/>
  <rect x="57" y="67" width="84" height="122" fill="none" stroke="#0d0c09" stroke-width="0.7" stroke-opacity="0.4"/>
  <rect x="60" y="70" width="84" height="122" fill="url(#ph)" clip-path="url(#cTL)"/>
  <rect x="60" y="70" width="84" height="122" fill="url(#ph2)" clip-path="url(#sTL)"/>
  <!-- Highlight edges -->
  <line x1="61" y1="71" x2="143" y2="71" stroke="#faf8f3" stroke-width="1.3"/>
  <line x1="61" y1="71" x2="61" y2="191" stroke="#faf8f3" stroke-width="0.9"/>
  <!-- Shadow edges -->
  <line x1="61" y1="191" x2="143" y2="191" stroke="#0d0c09" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="143" y1="71" x2="143" y2="191" stroke="#0d0c09" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- TOP-RIGHT -->
  <rect x="176" y="70" width="84" height="122" fill="#f2eeE6" stroke="#0d0c09" stroke-width="1.5"/>
  <rect x="173" y="67" width="84" height="122" fill="none" stroke="#0d0c09" stroke-width="0.7" stroke-opacity="0.4"/>
  <rect x="176" y="70" width="84" height="122" fill="url(#ph)" clip-path="url(#cTR)"/>
  <rect x="176" y="70" width="84" height="122" fill="url(#ph2)" clip-path="url(#sTR)"/>
  <line x1="177" y1="71" x2="259" y2="71" stroke="#faf8f3" stroke-width="1.3"/>
  <line x1="177" y1="71" x2="177" y2="191" stroke="#faf8f3" stroke-width="0.9"/>
  <line x1="177" y1="191" x2="259" y2="191" stroke="#0d0c09" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="259" y1="71" x2="259" y2="191" stroke="#0d0c09" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- BOTTOM-LEFT -->
  <rect x="60" y="228" width="84" height="292" fill="#f2eeE6" stroke="#0d0c09" stroke-width="1.5"/>
  <rect x="57" y="225" width="84" height="292" fill="none" stroke="#0d0c09" stroke-width="0.7" stroke-opacity="0.4"/>
  <rect x="60" y="228" width="84" height="292" fill="url(#ph)" clip-path="url(#cBL)"/>
  <rect x="60" y="228" width="84" height="292" fill="url(#ph2)" clip-path="url(#sBL)"/>
  <line x1="61" y1="229" x2="143" y2="229" stroke="#faf8f3" stroke-width="1.3"/>
  <line x1="61" y1="229" x2="61" y2="519" stroke="#faf8f3" stroke-width="0.9"/>
  <line x1="61" y1="519" x2="143" y2="519" stroke="#0d0c09" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="143" y1="229" x2="143" y2="519" stroke="#0d0c09" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- BOTTOM-RIGHT -->
  <rect x="176" y="228" width="84" height="292" fill="#f2eeE6" stroke="#0d0c09" stroke-width="1.5"/>
  <rect x="173" y="225" width="84" height="292" fill="none" stroke="#0d0c09" stroke-width="0.7" stroke-opacity="0.4"/>
  <rect x="176" y="228" width="84" height="292" fill="url(#ph)" clip-path="url(#cBR)"/>
  <rect x="176" y="228" width="84" height="292" fill="url(#ph2)" clip-path="url(#sBR)"/>
  <line x1="177" y1="229" x2="259" y2="229" stroke="#faf8f3" stroke-width="1.3"/>
  <line x1="177" y1="229" x2="177" y2="519" stroke="#faf8f3" stroke-width="0.9"/>
  <line x1="177" y1="519" x2="259" y2="519" stroke="#0d0c09" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="259" y1="229" x2="259" y2="519" stroke="#0d0c09" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- ── SPECIMEN PLACARD ── -->
  <rect x="108" y="202" width="104" height="22" fill="#f2eeE6" stroke="#0d0c09" stroke-width="1.2"/>
  <rect x="111" y="205" width="98" height="16" fill="none" stroke="#0d0c09" stroke-width="0.4"/>
  <text x="160" y="213.5" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="6.5" letter-spacing="3" fill="#0d0c09">SPECIMEN ARCHIVE</text>
  <text x="160" y="221" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="6" letter-spacing="2" fill="#0d0c09" fill-opacity="0.65">— Project μ —</text>

  <!-- ── HANDLE PLATE ── -->
  <rect x="252" y="358" width="20" height="96" rx="4" fill="#0d0c09"/>
  <rect x="253.5" y="359.5" width="17" height="93" rx="3" fill="#221e14"/>
  <line x1="262" y1="370" x2="262" y2="444" stroke="#3a3220" stroke-width="0.8"/>

  <!-- ── DOOR KNOB ── -->
  <circle cx="262" cy="402" r="17" fill="#0d0c09"/>
  <circle cx="262" cy="402" r="13" fill="#2c2616"/>
  <ellipse cx="257" cy="396" rx="5.5" ry="4.5" fill="#4a3e26" opacity="0.7"/>
  <ellipse cx="255.5" cy="394.5" rx="2.2" ry="1.8" fill="#8a7850" opacity="0.5"/>

  <!-- ── KEYHOLE ── -->
  <circle cx="262" cy="436" r="6.5" fill="#0d0c09"/>
  <circle cx="262" cy="436" r="3.8" fill="#f2eeE6"/>
  <path d="M259 439 L265 439 L266.5 450 L257.5 450 Z" fill="#0d0c09"/>

  <!-- ── CORNER ROSETTES ── -->
  <circle cx="46" cy="46" r="6" fill="#0d0c09"/>
  <circle cx="46" cy="46" r="3" fill="#f2eeE6"/>
  <circle cx="46" cy="46" r="1.2" fill="#0d0c09"/>

  <circle cx="274" cy="46" r="6" fill="#0d0c09"/>
  <circle cx="274" cy="46" r="3" fill="#f2eeE6"/>
  <circle cx="274" cy="46" r="1.2" fill="#0d0c09"/>

  <circle cx="46" cy="552" r="6" fill="#0d0c09"/>
  <circle cx="46" cy="552" r="3" fill="#f2eeE6"/>
  <circle cx="46" cy="552" r="1.2" fill="#0d0c09"/>

  <circle cx="274" cy="552" r="6" fill="#0d0c09"/>
  <circle cx="274" cy="552" r="3" fill="#f2eeE6"/>
  <circle cx="274" cy="552" r="1.2" fill="#0d0c09"/>

  <!-- ── SHADOW UNDER DOOR ── -->
  <ellipse cx="160" cy="592" rx="110" ry="8" fill="#0d0c09" fill-opacity="0.18"/>

  <!-- ── THIN LIGHT CRACK AT DOOR BOTTOM ── -->
  <line x1="28" y1="578" x2="292" y2="578" stroke="#f2eeE6" stroke-width="0.6" stroke-opacity="0.5"/>
</svg>
