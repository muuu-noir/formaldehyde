<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FORMALDEHYDE</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      overflow: hidden;
      cursor: crosshair;
      background: #070707;
    }

    /* ── Scene ── */
    .scene {
      position: fixed;
      inset: 0;
      opacity: 0;
      animation: scene-in 2.2s var(--ease-out) 0.3s forwards;
    }

    @keyframes scene-in { to { opacity: 1; } }

    /* Room illustration */
    .room-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      filter: brightness(0.78) saturate(0.88);
      image-rendering: auto;
    }

    /* Vignette only */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 30%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Book zone (skull area on shelf) ── */
    .book-zone {
      position: absolute;
      right: 20%;
      top: 18%;
      width: 24%;
      height: 38%;
      z-index: 10;
      cursor: pointer;
    }

    /* Ambient pulse glow */
    .book-zone::before {
      content: '';
      position: absolute;
      inset: -10px;
      background: radial-gradient(ellipse at 55% 48%,
        rgba(180,150,160,0.45) 0%, transparent 65%);
      opacity: 0.3;
      animation: zone-pulse 3s ease-in-out infinite;
      pointer-events: none;
      transition: opacity 0.5s var(--ease);
    }

    .book-zone:hover::before { opacity: 1; animation: none; }


    /* Archive label — always visible */
    .book-label {
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      color: rgba(212,206,212,0.85);
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 1;
      transition: color 0.4s var(--ease), background 0.4s var(--ease), box-shadow 0.4s var(--ease);
      pointer-events: none;
      background: rgba(7,7,7,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 0.4rem 1rem;
      box-shadow: 0 0 20px 14px rgba(7,7,7,0.45), 0 0 40px 20px rgba(7,7,7,0.25);
    }

    .book-zone:hover .book-label {
      color: rgba(212,206,212,1);
      background: rgba(7,7,7,0.7);
      box-shadow: 0 0 24px 16px rgba(7,7,7,0.55), 0 0 50px 28px rgba(7,7,7,0.3);
    }

    /* ── Note zone (center-left = handwritten note) ── */
    .note-zone {
      position: absolute;
      left: 14%;
      top: 63%;
      width: 22%;
      height: 22%;
      z-index: 10;
      cursor: pointer;
    }

    .note-zone::before {
      content: '';
      position: absolute;
      inset: -10px;
      background: radial-gradient(ellipse at 50% 60%,
        rgba(180,150,160,0.45) 0%, transparent 65%);
      opacity: 0.3;
      animation: zone-pulse 3s ease-in-out 1.5s infinite;
      pointer-events: none;
      transition: opacity 0.5s var(--ease);
    }

    .note-zone:hover::before { opacity: 1; animation: none; }

    .note-label {
      position: absolute;
      bottom: -1.6rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      color: rgba(212,206,212,0.85);
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 1;
      pointer-events: none;
      background: rgba(7,7,7,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 0.4rem 1rem;
      transition: color 0.4s var(--ease), background 0.4s var(--ease), box-shadow 0.4s var(--ease);
      box-shadow: 0 0 20px 14px rgba(7,7,7,0.45), 0 0 40px 20px rgba(7,7,7,0.25);
    }

    .note-zone:hover .note-label {
      color: rgba(212,206,212,1);
      background: rgba(7,7,7,0.7);
      box-shadow: 0 0 24px 16px rgba(7,7,7,0.55), 0 0 50px 28px rgba(7,7,7,0.3);
    }

    /* Delayed hint text */
    .room-hint {
      position: absolute;
      bottom: 5%;
      right: 1.5%;
      width: 26%;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.57rem;
      letter-spacing: 0.36em;
      color: var(--text-dim);
      text-transform: uppercase;
      opacity: 0;
      animation: hint-in 1s var(--ease) 2s forwards;
      pointer-events: none;
      z-index: 11;
    }

    @keyframes hint-in { to { opacity: 0.45; } }

    @keyframes zone-pulse {
      0%, 100% { opacity: 0.25; transform: scale(1); }
      50%       { opacity: 0.9;  transform: scale(1.05); }
    }

    /* ── Cat zone ── */
    .cat-zone {
      position: absolute;
      left: 26%;
      top: 61%;
      width: 10%;
      height: 14%;
      z-index: 10;
      cursor: crosshair;
      display: none;
    }

    /* ── Window zone ── */
    .window-zone {
      position: absolute;
      left: 1%;
      top: 1%;
      width: 21%;
      height: 58%;
      z-index: 10;
      cursor: crosshair;
    }

    /* ── Hidden message overlay ── */
    #hidden-msg {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      background: rgba(7,7,7,0.45);
      cursor: pointer;
    }

    #hidden-msg.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .hidden-msg-inner {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(0.9rem, 2.2vw, 1.35rem);
      color: rgba(212,206,212,0.82);
      text-align: center;
      letter-spacing: 0.07em;
      line-height: 2.2;
      pointer-events: none;
    }

    /* ── Typewriter zone ── */
    .typewriter-zone {
      position: absolute;
      left: 65%;
      top: 55%;
      width: 12%;
      height: 30%;
      z-index: 10;
      cursor: crosshair;
    }

    /* ── Poem overlay ── */
    #poem-msg {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      background: rgba(7,7,7,0.88);
      cursor: pointer;
    }

    #poem-msg.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .poem-inner {
      font-family: var(--mono);
      font-size: clamp(0.72rem, 1.4vw, 0.95rem);
      color: rgba(212,206,212,0.88);
      text-align: left;
      letter-spacing: 0.06em;
      line-height: 2.2;
      white-space: pre;
      pointer-events: none;
      max-width: 520px;
    }

    .poem-cursor {
      display: inline-block;
      width: 0.55em;
      height: 1em;
      background: rgba(212,206,212,0.75);
      vertical-align: text-bottom;
      animation: blink 0.75s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @media (max-width: 640px) {
      .cat-zone, .window-zone, .typewriter-zone { display: none !important; }
    }

    /* ── Back to top ── */
    .room-logo {
      position: fixed;
      top: 1.5rem;
      left: 2.5rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.42em;
      color: var(--text);
      text-transform: uppercase;
      text-decoration: none;
      z-index: 100;
      opacity: 0;
      animation: hint-in 1s var(--ease) 2s forwards;
      transition: color 0.4s var(--ease);
      text-shadow: 0 1px 8px rgba(0,0,0,0.9), 0 0 24px rgba(0,0,0,0.8);
    }

    .room-logo:hover { color: var(--accent); }

    /* ── Find me intro (first visit, desktop only) ── */
    #findme-intro {
      position: fixed;
      inset: 0;
      background: #070707;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.55s ease;
      pointer-events: none;
    }

    #findme-intro.fade-out { opacity: 0; }

    .findme-text {
      font-family: var(--serif);
      font-size: clamp(3rem, 8vw, 6rem);
      font-style: italic;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: rgba(212,206,212,0.88);
      opacity: 0;
      animation: findme-in 1s ease 0.2s forwards;
    }

    @keyframes findme-in { to { opacity: 1; } }

    /* ── Veil ── */
    #veil {
      position: fixed;
      inset: 0;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      z-index: 9000;
      transition: opacity 0.85s var(--ease);
    }

    #veil.closing { opacity: 1; }

    /* ── Mobile overlay menu ── */
    .mobile-menu {
      display: none;
    }

    @media (max-width: 640px) {
      .room-img {
        object-position: center;
      }

      .mobile-menu { display: none; }

      /* Archive label: upper right */
      .book-zone {
        right: 4%;
        top: 12%;
        width: auto;
        height: auto;
      }

      .book-label {
        position: static;
        transform: none;
        opacity: 1;
      }

      /* About label: lower left */
      .note-zone {
        left: 4%;
        top: auto;
        bottom: 12%;
        width: auto;
        height: auto;
      }

      .note-label {
        position: static;
        transform: none;
        bottom: auto;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div id="veil"></div>
  <div id="hidden-msg">
    <p class="hidden-msg-inner">She left without closing the window.<br>The rain has been waiting ever since.</p>
  </div>
  <div id="poem-msg">
    <div class="poem-inner" id="poem-text"></div>
  </div>
  <div id="findme-intro"><span class="findme-text">Find me</span></div>

  <a href="./index.html" class="room-logo">F&thinsp;O&thinsp;R&thinsp;M&thinsp;A&thinsp;L&thinsp;D&thinsp;E&thinsp;H&thinsp;Y&thinsp;D&thinsp;E</a>

  <div class="scene">
    <img class="room-img" id="room-img" src="img/room.webp" alt="" draggable="false">
    <div class="vignette"></div>

    <div class="book-zone" id="books">
      <span class="book-label">Archive →</span>
    </div>

    <div class="note-zone" id="note">
      <span class="note-label">← About</span>
    </div>

    <div class="cat-zone" id="cat-zone"></div>
    <div class="window-zone" id="window-zone"></div>
    <div class="typewriter-zone" id="typewriter-zone"></div>

  </div>

  <div class="mobile-menu">
    <div class="mobile-links">
      <button class="mobile-link" id="m-archive">Archive</button>
      <button class="mobile-link" id="m-about">About</button>
    </div>
  </div>

  <script>
    const rooms = ['img/room.webp', 'img/room_empty.webp', 'img/room_cat.webp'];
    const pick = rooms[Math.floor(Math.random() * 3)];
    const roomImg = document.getElementById('room-img');
    roomImg.src = pick;

    // Time-based filter
    (function () {
      const h = new Date().getHours();
      let f;
      if      (h >= 23 || h < 5)  f = 'brightness(0.48) saturate(0.6) hue-rotate(-12deg)';
      else if (h >= 5  && h < 10) f = 'brightness(0.85) saturate(0.9) sepia(0.1)';
      else if (h >= 17 && h < 23) f = 'brightness(0.66) saturate(0.8) sepia(0.08)';
      if (f) roomImg.style.filter = f;
    })();

    // Cat zone: show only when cat image is active
    const catZone = document.getElementById('cat-zone');
    if (pick === 'img/room_cat.webp') catZone.style.display = 'block';

    catZone.addEventListener('click', () => {
      roomImg.style.transition = 'opacity 1.2s ease';
      roomImg.style.opacity = '0';
      setTimeout(() => {
        roomImg.src = 'img/room_empty.webp';
        roomImg.style.opacity = '1';
        catZone.style.display = 'none';
      }, 1200);
    });

    // Window zone: hidden message
    const windowZone = document.getElementById('window-zone');
    const hiddenMsg  = document.getElementById('hidden-msg');
    windowZone.addEventListener('click', () => hiddenMsg.classList.add('visible'));
    hiddenMsg.addEventListener('click',  () => hiddenMsg.classList.remove('visible'));

    // Typewriter zone: poem with typing animation
    const typewriterZone = document.getElementById('typewriter-zone');
    const poemMsg  = document.getElementById('poem-msg');
    const poemText = document.getElementById('poem-text');

    const poem = `I named it specimen\nso I would not have to call it loss.\n\nEverything I could not hold\nI held in formaldehyde.\n\nStill.  Fixed.  Mine.`;

    let typing = false;

    typewriterZone.addEventListener('click', () => {
      poemMsg.classList.add('visible');
      if (typing || poemText.dataset.done) return;
      typing = true;
      poemText.textContent = '';
      const cursor = document.createElement('span');
      cursor.className = 'poem-cursor';
      poemText.appendChild(cursor);
      let i = 0;
      const tick = setInterval(() => {
        if (i < poem.length) {
          cursor.insertAdjacentText('beforebegin', poem[i++]);
        } else {
          clearInterval(tick);
          typing = false;
          poemText.dataset.done = '1';
          setTimeout(() => cursor.remove(), 1800);
        }
      }, 42);
    });

    poemMsg.addEventListener('click', () => poemMsg.classList.remove('visible'));

    // First-visit "Find me" intro — desktop browser only
    (function () {
      const intro = document.getElementById('findme-intro');
      if (!intro) return;
      if (window.innerWidth <= 640 || localStorage.getItem('room_intro_seen')) {
        intro.remove();
        return;
      }
      localStorage.setItem('room_intro_seen', '1');
      setTimeout(() => {
        intro.classList.add('fade-out');
        setTimeout(() => intro.remove(), 550);
      }, 2100);
    })();

    const books = document.getElementById('books');
    const note  = document.getElementById('note');
    const veil  = document.getElementById('veil');
    let going = false;

    const navigate = (url) => {
      if (going) return;
      going = true;
      veil.classList.add('closing');
      setTimeout(() => { window.location.href = url; }, 950);
    };

    books.addEventListener('click', () => navigate('./archive.html'));
    note.addEventListener('click',  () => navigate('./about.html'));

    document.getElementById('m-archive')?.addEventListener('click', () => navigate('./archive.html'));
    document.getElementById('m-about')?.addEventListener('click',   () => navigate('./about.html'));
  </script>
</body>
</html>
