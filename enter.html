<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FORMALDEHYDE</title>
  <link rel="icon" href="https://mog147.github.io/img/profile/profile_avatar.png">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .door-wrap {
      position: relative;
      width: min(240px, 55vw);
      opacity: 0;
      animation: door-arrive 1.8s var(--ease-out) 0.6s forwards;
    }

    @keyframes door-arrive {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .door-svg {
      width: 100%;
      height: auto;
      display: block;
      transform-origin: left center;
      transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1),
                  filter 0.6s var(--ease);
      filter: brightness(0.88);
    }

    .door-wrap:hover .door-svg {
      transform: perspective(700px) rotateY(-8deg) translateX(-2%);
      filter: brightness(0.96);
    }

    .door-hint {
      margin-top: 2.8rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.38em;
      color: var(--text-dim);
      text-transform: uppercase;
      opacity: 0;
      animation: hint-in 1s var(--ease) 3.5s forwards;
    }

    @keyframes hint-in {
      to { opacity: 1; }
    }

    /* Transition overlay */
    #veil {
      position: fixed;
      inset: 0;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      z-index: 9000;
      transition: opacity 0.85s var(--ease);
    }

    #veil.closing { opacity: 1; }
  </style>
</head>
<body>

  <div id="veil"></div>

  <div class="door-wrap" id="door">
    <img class="door-svg" src="img/door.svg" alt="Enter the archive" draggable="false">
  </div>
  <span class="door-hint">enter</span>

  <script>
    const door = document.getElementById('door');
    const veil = document.getElementById('veil');
    let entered = false;

    door.addEventListener('click', () => {
      if (entered) return;
      entered = true;
      veil.classList.add('closing');
      setTimeout(() => { window.location.href = './index.html'; }, 950);
    });
  </script>

</body>
</html>
